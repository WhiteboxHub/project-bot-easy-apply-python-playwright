# Example Candidate Configuration
# Copy this to candidates.yaml and fill in your details

candidates:
  - id: candidate_001
    name: "Full Name"
    enabled: true
    credentials:
      email: "your_email@example.com"
      password: ""  # Leave empty to use .env
      phone: "1234567890"
    profile_path: ""
    uploads:
      Resume: ./assets/candidates/candidate_001/resume.pdf
      Cover Letter: ./assets/candidates/candidate_001/cover_letter.pdf
    search:
      positions:
        - "Software Engineer"
      locations:
        - "Remote"
      salary: 100000
      rate: 50
      experience_level:
        - 2
        - 3
    profile_data:
      full_name: "Full Name"
      email: "your_email@example.com"
      phone: "1234567890"
      country_code: "Your Country (+1)"
      years_experience: "3"
      sponsorship_required: "No"
      authorized_to_work: "Yes"
      willing_to_relocate: "Yes"
      current_salary: "80000"
      expected_salary: "120000"
      notice_period: "30 days"
      portfolio_url: "https://github.com/yourusername"
      linkedin_url: "https://linkedin.com/in/yourusername"
      learned_answers: {}
    preferences:
      max_applications_per_run: 50
      cooldown_seconds: 5
      dry_run: false
    schedule:
      enabled: false
      cron: "0 9 * * 1-5"
      timezone: "America/New_York"
      profile_management:
        max_session_age_days: 25
        backup_profile: false
        health_check: true

# GLOBAL PROXY CONFIGURATION
# This will be used by any candidate that doesn't define their own proxy pool
proxy:
  enabled: false
  provider: "brightdata"
  rotation:
    strategy: "per_candidate" # options: per_session, per_candidate
  health_check:
    enabled: true
    url: "https://lumtest.com/myip.json"
    timeout: 10
  pools:
    - name: "brightdata_residential_us"
      type: "residential"
      host: "brd.superproxy.io"
      port: 22225
      username: "brd-customer-ID-zone-ZONE"
      password: "PASSWORD"
      country: "US"
      enabled: true
